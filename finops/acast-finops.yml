description: >-
  FinOps view of Acast spend. Acast is billed as a flat monthly (or annual)
  subscription per plan tier rather than metered API usage - the Publishing API
  itself carries no separate per-call fee. The relevant cost decision for a team
  wanting API access is the plan gate: the Publishing API and Webhooks are only
  available on the Ace subscription or the custom Creator Network agreement, so
  API adoption implies at least the Ace tier's recurring subscription. Acast is
  also a two-sided marketplace - creators can earn ad and sponsorship revenue
  that offsets or exceeds the subscription cost - so net cost should be
  considered alongside monetization income.
notes: >-
  Subscription prices are quoted in EUR on the Acast pricing page and vary by
  region and billing period; the Creator Network tier is custom-priced. There is
  no usage-based API meter. Verify current amounts during reconciliation.

meters:
- name: subscription_seat
  description: Flat monthly or annual subscription for the plan tier that unlocks API access (Ace or Creator Network).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: episode_storage
  description: Episodes hosted and stored on Acast; included in the subscription, not separately metered.
  unit: episodes
  aggregation: sum
  dimensions:
  - account
  - show
principles:
- name: Visibility
  description: Track which plan tier each account holds; API access presence maps directly to being on Ace or the Creator Network.
- name: Allocation
  description: Attribute the Ace/Creator Network subscription to the team that depends on the Publishing API and Webhooks.
- name: Optimization
  description: Choose annual billing over monthly for a lower effective monthly rate; consolidate shows under one qualifying account rather than paying for multiple tiers.
- name: Accountability
  description: Weigh subscription cost against ad and sponsorship revenue earned through the Acast marketplace to assess net spend.
